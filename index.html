<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog do Andreon</title>
    
    <style>
        header{
          background-color: ##000080;
          color: #000080;
          max-width: 800px;
          margin: 0 auto;
          padding: 15px;
        }
        main{
          background-color: #808080;
          color: #000080;
          max-width: 800px;
          margin: 0 auto;
          padding: 15px;
          display: flex;
        }
        img{
            width: 80px;
            height: 80px;
            align-content: center;
            display: flex;
        }
        article{
            display: flex;
        }
        .artigo-autor {
            font-weight: bold;
            
        }display: flex;
    </style>
</head>
<body>
  <header>
    <h1>Meu blog</h1>
    <p>Este blog será sobre fábrica de carros!</p>
  </header>
  <main>
    <article>
        <img src="file:///tmp/guest-imi752/Downloads/logo.fabrica.jpg" alt="imagen de um carro com asas azul com prata">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: Andreon</p>
            <p>Bem-vindo ao meu blog, aqui será mostrado a criação do seu veículo</p>
            <button>🏎️ <span>0</span></button>
            <button>🏭 <span>0</span></button>
     </article>
        </div>
    <article>
        <img src="file:///tmp/guest-imi752/Downloads/logo.fabrica.jpg" alt="imagen de um carro com asas azul com prata">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: Andreon</p>
            <p>Bem-vindo ao meu blog, aqui será mostrado a criação do seu veículo</p>
            <button>🏎️ <span>0</span></button>
            <button>🏭 <span>0</span></button>
     </article>
  </main>
</body>
<script>
    const botoes = document.querySelectorAll("button");
    
    botoes.forEach(function (botao) {
        let curtiu = false;
        botao.addEventListener("click", botaoClicado);
        function botaoClicado(){
            console.log("Fui clicado");
            let texto = botao.querySelector("span");
            if (curtiu === false){
                texto.textContent++;
                curtiu = true;
            } else {
                texto.textContent--;
                curtiu = false;
            } 
        }
    })

    
</script>
</html>
